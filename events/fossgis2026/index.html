<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fahrplan</title>
    <meta name="author" content="Anton P. Braun and Felix Divo">
    <link rel="stylesheet" href="style.css">
</head>

<body class="tinted-background">
    <noscript>JavaScript is required to render the schedule. Please enable it and reload.</noscript>
    <div class="schedule-container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">24.03.2026 – 28.03.2026</div>
            <div class="fg26-logo" role="img" aria-label="FOSSGIS e.V."></div>
        </div>

        <!-- Title Section -->
        <div class="title-section">
            <div class="title-left">
                <div class="title-label">
                    <span class="title-label-bold">Abfahrt</span>
                    <span class="title-label-italic">Departure</span>
                    <span class="title-label-italic">Départ</span>
                </div>
                <div class="station-name">FOSSGIS Konferenz 2026</div>
            </div>
        </div>

        <div id="schedule-toolbar-root" tabindex="-1"></div>
        <div id="schedule-banners-root"></div>
        <div id="schedule-status-root" role="status" aria-live="polite" class="schedule-status-sr"></div>

        <dialog id="clear-favorites-dialog" class="clear-favorites-dialog" aria-labelledby="clear-favorites-dialog-title">
            <h2 id="clear-favorites-dialog-title">Alle Favoriten entfernen?</h2>
            <p class="clear-favorites-dialog-text" id="clear-favorites-dialog-text"></p>
            <div class="clear-favorites-dialog-actions">
                <button type="button" class="toolbar-btn" id="clear-favorites-dialog-cancel" autofocus>Abbrechen</button>
                <button type="button" class="toolbar-btn" id="clear-favorites-dialog-confirm">Alle entfernen</button>
            </div>
        </dialog>

        <!-- Column Headers (Anzahl per URL-Parameter columns, z. B. columns=mobile) -->
        <div class="column-headers-wrapper" id="column-headers-wrapper">
            <template id="column-headers-template">
                <div class="column-headers">
                    <div class="column-time-fav-hint">
                        <div class="column-header-bold">Zeit</div>
                        <div class="column-header-italic">Time</div>
                    </div>
                    <div>
                        <div class="column-header-bold">Zug</div>
                        <div class="column-header-italic">Train</div>
                    </div>
                    <div>
                        <div class="column-header-bold">Richtung</div>
                        <div class="column-header-italic">Destination</div>
                    </div>
                    <div class="col-platform">
                        <div class="column-header-bold">Gleis</div>
                        <div class="column-header-italic">Platform</div>
                    </div>
                </div>
            </template>
        </div>

        <!-- Departure Rows (Struktur wie Upstream: Inhalt in .departure-table-content) -->
        <div class="departure-table">
            <div class="departure-table-content"></div>
        </div>
    </div>

        <script src="../../assets/lucide.js"></script>
        <script>
            (async () => {
                // Event-specific configuration
                const scheduleUrl = 'https://pretalx.com/fossgis2026/schedule/export/schedule.json';
                const trackMap = {
                    'Grundlagen Open-Source-GIS und OpenStreetMap' : 'OSG',
                    'Neuigkeiten und Interessantes aus den Open-Source-Projekten' : 'NEW',
                    'OpenStreetMap' : 'OSM',
                    'Praxisberichte' : 'PRA',
                    'Daten, Datenbanken und Datenprozessierung' : 'DDD',
                    'Routing und Mobilität' : 'RUM',
                    'Raum-zeitliche Analysen und Modelle' : 'RZM',
                    'Rasterdaten und Fernerkundung' : 'RAS',
                    '3D, Drohnen, LIDAR, Geo-AR/VR' : '3D',
                    'Kartographie und Visualisierung' : 'KUV',
                    'Offene Standards, z.B. INSPIRE, OGC' : 'STA',
                    'Geodatenmanagement' : 'GDM',
                    'Open Data, Datenschutz und Lizenzen' : 'LIZ',
                    'Ausbildung, Lehre, Open Science' : 'EDU',
                    null: 'NAT',
                    undefined: 'NAT',
                };
                // Legende aus trackMap, Kürzel alphabetisch
                const trackLegendRows = Object.entries(trackMap)
                    .filter(([name]) => name != null)
                    .map(([name, code]) => [code, name])
                    .sort((a, b) => a[0].localeCompare(b[0]));
                const totalDays = 4;
                const headerDateRange = '24.03.2026 – 28.03.2026';
                const stationName = 'FOSSGIS Konferenz 2026';
                const timeRanges = [
                    { start: 9, end: 11, label: '9.00 — 11.00' },
                    { start: 12, end: 13, label: '12.00 — 13.00' },
                    { start: 14, end: 15, label: '14.00 — 15.00' },
                    { start: 16, end: 18, label: '16.00 — 18.00' },
                    { start: 19, end: 20, label: '19.00 — 20.00' },
                ];

                // Break/Pause constants
                const breakRoomName = 'Alle Räume';
                const breakPrefix = 'PAU';
                const breakTitlePrefix = 'Betriebsunterbrechung wegen';
                
                // Rooms that should be displayed in accent color
                const redRoomsList = ['HS1','HS2','HS3','HS4'];

                // Streaming-URL pro Raum (Livestream am Konferenztag); genaue URLs bei Bekanntwerden ergänzen
                const streamingUrlByRoom = {
                    'HS1': 'https://streaming.media.ccc.de/fossgis2026/hs1',
                    'HS2': 'https://streaming.media.ccc.de/fossgis2026/hs2',
                    'HS3': 'https://streaming.media.ccc.de/fossgis2026/hs3',
                    'HS4': 'https://streaming.media.ccc.de/fossgis2026/hs4',
                    'BoF1': '',
                    'BoF2': '',
                    'BoF3': '',
                    'WS1': '',
                    'WS2': '',
                    'WS3': '',
                    'WS4': '',
                    'OSM1': '',
                    'OSM2': '',
                    'OSM3': '',
                    'OO': '',
                    'Post': ''
                };

                const today = new Date();
                // for testing: set date to event date, hint: month are 0 based in JavaScript
                // today = new Date(2026, 2, 25);
                today.setHours(0, 0, 0, 0);

                // URL state (search params; refreshed by applyUrlState / navigation)
                let urlState = {
                    onlyDayParam: null,
                    onlyTrackParam: null,
                    onlyRoomParam: null,
                    favoritesParam: null,
                    tintedBackgroundParam: null,
                    noLinkUnderlineParam: null,
                    isSingleDay: false,
                    selectedDay: 1,
                };
                let columnsRaw = '4';
                let usedViewportFallback = false;

                const refreshUrlState = () => {
                    const params = new URLSearchParams(location.search);
                    urlState.onlyDayParam = params.get('only-day');
                    urlState.onlyTrackParam = params.get('only-track');
                    urlState.onlyRoomParam = params.get('only-room');
                    urlState.favoritesParam = params.get('favorites');
                    urlState.tintedBackgroundParam = params.get('tinted-background');
                    urlState.noLinkUnderlineParam = params.get('no-link-underline');
                    urlState.isSingleDay = urlState.onlyDayParam !== null;
                    urlState.selectedDay = parseInt(urlState.onlyDayParam ?? '1', 10);
                    columnsRaw = params.get('columns');
                    if (columnsRaw == null) {
                        columnsRaw = window.matchMedia('(max-width: 768px)').matches ? 'mobile' : '4';
                    }
                    usedViewportFallback = params.get('columns') === null && columnsRaw === 'mobile';
                };
                refreshUrlState();

                const disableLinkUnderline = urlState.noLinkUnderlineParam !== null && String(urlState.noLinkUnderlineParam).toLowerCase() !== 'false';

                // columns: mobile = 1 Spalte + volle Breite, sonst 1–4 (Standard 4)
                const isMobileColumns = columnsRaw.toLowerCase() === 'mobile';
                const columnsParam = parseInt(columnsRaw, 10);
                const columns = isMobileColumns ? 1 : (Number.isFinite(columnsParam) && columnsParam > 0 ? Math.min(columnsParam, 4) : 4);
                document.documentElement.style.setProperty('--columns', String(columns));
                // Bildschirmbreite: 841mm Desktop, 100% mobil (kein 100vw: vermeidet horizontales Scrollen durch Scrollbar-Breite)
                document.documentElement.style.setProperty('--page-width', isMobileColumns ? '100%' : '841mm');
                document.body.classList.toggle('mobile-columns', isMobileColumns);

                if (usedViewportFallback) {
                    const url = new URL(location.href);
                    url.searchParams.set('columns', 'mobile');
                    history.replaceState(null, '', url.toString());
                }

                // Optional: gelben Hintergrund (RAL 1003) ausschalten
                if (urlState.tintedBackgroundParam === 'false') {
                    document.body.classList.remove('tinted-background');
                }

                // URL-Helfer für Filter-Links und Reset (kombinierbare Filter, Toggle per zweiter Klick)
                const buildResetUrl = () => {
                    const url = new URL(location.href);
                    url.search = '';
                    return url.pathname;
                };
                const buildFilterToggleUrl = (paramKey, paramValue) => {
                    const url = new URL(location.href);
                    const current = url.searchParams.get(paramKey);
                    if (current === String(paramValue)) {
                        url.searchParams.delete(paramKey);
                    } else {
                        url.searchParams.set(paramKey, paramValue);
                    }
                    return url.search ? url.pathname + '?' + url.searchParams.toString() : url.pathname;
                };
                const escapeHtml = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
                const escapeAttr = (s) => String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
                const replaceBrowserUrlFrom = (url) => {
                    history.replaceState(null, '', url.pathname + (url.search ? url.search : '') + url.hash);
                };

                const EVENT_ID = 'fossgis2026';
                const STORAGE_KEY = `fossgis-fahrplan-favorites:${EVENT_ID}`;
                const SHARE_URL_WARN_CHARS = 8000;
                const FAVORITES_STAR_HINT = 'Stern unter der Uhrzeit';
                const FAVORITES_COPY = {
                    columnTimeTitle: `Favoriten: ${FAVORITES_STAR_HINT}`,
                    dialogBody: `Alle gespeicherten Favoriten auf diesem Gerät werden entfernt. Einzelne Termine kannst du auch mit dem ${FAVORITES_STAR_HINT} entfernen.`,
                    filterDisabledSaveFirst: `Speichere zuerst Favoriten mit dem ${FAVORITES_STAR_HINT}.`,
                    importSaveAllDetail: `Speichert alle Termine aus diesem Link bei dir als Favoriten. Einzelne Termine kannst du mit dem ${FAVORITES_STAR_HINT} setzen.`,
                    clearAllDetail: `Entfernt alle gespeicherten Favoriten auf diesem Gerät. Einzelne Termine kannst du auch mit dem ${FAVORITES_STAR_HINT} entfernen.`,
                    emptyState: `Du hast noch keine Favoriten. Markiere Programmpunkte mit dem ${FAVORITES_STAR_HINT}.`,
                };

                const VIEW_NORMAL = 'normal';
                const VIEW_SHARE = 'share';
                const VIEW_SHARE_ERROR = 'share_error';
                const VIEW_OWN_FAVORITES = 'own_favorites';

                // Reihenfolge: Share ok, Share fehlerhaft, ?favorites=1, sonst Normal.
                const resolveViewModeFromShareAndFavorites = (parsedShare, favoritesParam) => {
                    if (parsedShare.kind === 'ok') {
                        return {
                            viewMode: VIEW_SHARE,
                            programFiltersActive: false,
                            shareIdSet: parsedShare.ids,
                            shareErrorReason: null,
                        };
                    }
                    if (parsedShare.kind === 'bad') {
                        return {
                            viewMode: VIEW_SHARE_ERROR,
                            programFiltersActive: false,
                            shareIdSet: null,
                            shareErrorReason: parsedShare.reason,
                        };
                    }
                    if (favoritesParam === '1') {
                        return {
                            viewMode: VIEW_OWN_FAVORITES,
                            programFiltersActive: true,
                            shareIdSet: null,
                            shareErrorReason: null,
                        };
                    }
                    return {
                        viewMode: VIEW_NORMAL,
                        programFiltersActive: true,
                        shareIdSet: null,
                        shareErrorReason: null,
                    };
                };

                const deriveViewMode = ({ parsedShare, favoritesParam }) =>
                    resolveViewModeFromShareAndFavorites(parsedShare, favoritesParam);

                // Share link fragment: #f=1/<id>[,<id>…] (format version 1).
                const parseShareHash = (hash) => {
                    if (!hash || hash === '#') return { kind: 'none' };
                    const h = hash.startsWith('#') ? hash.slice(1) : hash;
                    if (!h.startsWith('f=')) return { kind: 'none' };
                    const m = /^f=(\d+)\/([\s\S]*)$/.exec(h);
                    if (!m) return { kind: 'bad', reason: 'invalid' };
                    const version = parseInt(m[1], 10);
                    const rest = m[2];
                    if (version !== 1) return { kind: 'bad', reason: 'version' };
                    const tokens = rest.split(',').map((t) => t.trim()).filter(Boolean);
                    const ids = [];
                    for (const t of tokens) {
                        if (!/^\d+$/.test(t)) return { kind: 'bad', reason: 'invalid' };
                        ids.push(Number(t));
                    }
                    if (!ids.length) return { kind: 'bad', reason: 'empty' };
                    return { kind: 'ok', ids: new Set(ids) };
                };

                const buildShareHashFromIds = (ids) => {
                    const sorted = [...new Set(ids)].filter((x) => Number.isFinite(x)).sort((a, b) => a - b);
                    return `#f=1/${sorted.join(',')}`;
                };

                // DOM hooks
                const headerLeft = document.querySelector('.header-left');
                const stationNameEl = document.querySelector('.station-name');
                const columnHeadersWrapper = document.getElementById('column-headers-wrapper');
                const columnHeadersTemplate = document.getElementById('column-headers-template');
                const departureTable = document.querySelector('.departure-table');
                const departureTableContent = document.querySelector('.departure-table-content');
                const toolbarRoot = document.getElementById('schedule-toolbar-root');
                const bannersRoot = document.getElementById('schedule-banners-root');
                const statusRoot = document.getElementById('schedule-status-root');
                if (!departureTable || !departureTableContent || !columnHeadersWrapper || !columnHeadersTemplate) return;

                const clearFavoritesDialogTextEl = document.getElementById('clear-favorites-dialog-text');
                if (clearFavoritesDialogTextEl) {
                    clearFavoritesDialogTextEl.textContent = FAVORITES_COPY.dialogBody;
                }
                const columnTimeFavHintEl = columnHeadersTemplate.content.querySelector('.column-time-fav-hint');
                if (columnTimeFavHintEl) {
                    columnTimeFavHintEl.setAttribute('title', FAVORITES_COPY.columnTimeTitle);
                }

                const clearFavoritesDialogEl = document.getElementById('clear-favorites-dialog');

                // Favorites (localStorage)
                const loadFavorites = () => {
                    try {
                        const raw = localStorage.getItem(STORAGE_KEY);
                        if (!raw) return { v: 1, ids: [] };
                        const parsed = JSON.parse(raw);
                        const ids = Array.isArray(parsed.ids) ? parsed.ids.filter((x) => Number.isFinite(x)) : [];
                        return { v: typeof parsed.v === 'number' ? parsed.v : 1, ids };
                    } catch {
                        return { v: 1, ids: [] };
                    }
                };

                const saveFavorites = (state) => {
                    try {
                        localStorage.setItem(STORAGE_KEY, JSON.stringify({ v: 1, ids: [...new Set(state.ids)].sort((a, b) => a - b) }));
                        return true;
                    } catch {
                        if (statusRoot) {
                            statusRoot.textContent = 'Favoriten konnten nicht gespeichert werden (Speicher voll oder privates Fenster).';
                            statusRoot.classList.remove('schedule-status-sr');
                            setTimeout(() => {
                                statusRoot.textContent = '';
                                statusRoot.classList.add('schedule-status-sr');
                            }, 5000);
                        }
                        return false;
                    }
                };

                const toggleFavorite = (talkId) => {
                    const cur = loadFavorites();
                    const set = new Set(cur.ids);
                    if (set.has(talkId)) set.delete(talkId);
                    else set.add(talkId);
                    return saveFavorites({ v: 1, ids: [...set] });
                };

                // Column headers: clone template once per column
                columnHeadersWrapper.innerHTML = '';
                for (let i = 0; i < columns; i += 1) {
                    columnHeadersWrapper.appendChild(columnHeadersTemplate.content.cloneNode(true));
                }

                if (headerLeft && headerDateRange) headerLeft.textContent = headerDateRange;
                let programFiltersActive = true;

                const updateStationTitle = (filterLabelParts) => {
                    if (stationNameEl && stationName) {
                        const titleText = filterLabelParts.length ? `${stationName} — ${filterLabelParts.join(' — ')}` : stationName;
                        stationNameEl.innerHTML = `<a href="${buildResetUrl()}" title="Alle Filter zurücksetzen">${escapeHtml(titleText)}</a>`;
                    }
                };

                const buildFilterLabelParts = () => {
                    const parts = [];
                    if (urlState.onlyDayParam != null && urlState.onlyDayParam !== '') {
                        parts.push(`Tag ${urlState.selectedDay}`);
                    }
                    if (urlState.onlyRoomParam) parts.push(urlState.onlyRoomParam);
                const trackDisplay = (() => {
                        if (!urlState.onlyTrackParam) return null;
                        const target = urlState.onlyTrackParam.toLowerCase();
                    const matchFull = Object.keys(trackMap).find((name) => (name || '').toLowerCase() === target);
                    if (matchFull) return matchFull;
                    const matchCode = Object.entries(trackMap).find(([, code]) => (code || '').toLowerCase() === target);
                    if (matchCode) return matchCode[0];
                        return urlState.onlyTrackParam;
                })();
                    if (trackDisplay) parts.push(trackDisplay);
                    return parts;
                };

                updateStationTitle(buildFilterLabelParts());

                const passesFilters = (talk, roomName) => {
                    if (!programFiltersActive) return true;
                    if (urlState.onlyTrackParam) {
                        const target = urlState.onlyTrackParam.toLowerCase();
                        const trackRaw = (talk.track || '').toString().toLowerCase();
                        const trackCode = (trackMap[talk.track] || '').toLowerCase();
                        if (trackRaw !== target && trackCode !== target) return false;
                    }
                    if (urlState.onlyRoomParam) {
                        const targetRoom = urlState.onlyRoomParam.toLowerCase();
                        const roomLower = roomName.toLowerCase();
                        if (roomLower !== targetRoom && !roomLower.includes(targetRoom)) return false;
                    }
                    return true;
                };

                const showError = (msg) => {
                    departureTableContent.innerHTML = `<div class="no-data">${msg}</div>`;
                };
                departureTableContent.innerHTML = '<div class="loading">Lade Inhalte…</div>';

                // Fetch schedule data
                let data;
                try {
                    const res = await fetch(scheduleUrl);
                    data = await res.json();
                } catch (e) {
                    showError('Daten konnten nicht geladen werden. Bitte Verbindung prüfen.');
                    return;
                }

                // Fetch widget JSON for breaks/pauses
                let widgetData = null;
                try {
                    // Use generic /v/latest/ URL which always provides the latest version
                    const widgetUrl = scheduleUrl.replace(/\/export\/schedule\.json$/, '/v/latest/widgets/schedule.json');
                    const widgetRes = await fetch(widgetUrl);
                    if (widgetRes.ok) {
                        widgetData = await widgetRes.json();
                    } else {
                        console.warn('Widget-JSON konnte nicht geladen werden (HTTP ' + widgetRes.status + ')');
                    }
                } catch (e) {
                    console.warn('Widget-JSON konnte nicht geladen werden, Pausen werden nicht angezeigt:', e);
                }

                const toMinutes = (hhmm) => parseInt(hhmm.slice(0, 2), 10) * 60 + parseInt(hhmm.slice(-2), 10);
                const toHours = (mins) => `${String(Math.floor(mins / 60) % 24).padStart(2, '0')}:${String(mins % 60).padStart(2, '0')}`;
                const timeForSort = (hhmm) => {
                    if (!hhmm || typeof hhmm !== 'string') return 9999;
                    const mins = toMinutes(hhmm);
                    return isNaN(mins) ? 9999 : (mins < 360 ? mins + (24 * 60) : mins);
                };

                const isoToHHMM = (isoString) => {
                    if (!isoString) return '';
                    const date = new Date(isoString);
                    const hours = String(date.getHours()).padStart(2, '0');
                    const minutes = String(date.getMinutes()).padStart(2, '0');
                    return `${hours}:${minutes}`;
                };

                const weekdayFromIso = (iso) => {
                    if (!iso) return '';
                    const [y, m, d] = iso.split('-').map(Number);
                    if (!y || !m || !d) return '';
                    const date = new Date(y, m - 1, d);
                    if (isNaN(date.getTime())) return '';
                    return new Intl.DateTimeFormat('de-DE', { weekday: 'long' }).format(date);
                };

                const hasAdditionalInfo = (title) => {
                    return /\+|und|&/i.test(title);
                };

                const shouldReplaceBreak = (existing, newTitle) => {
                    const existingHasInfo = hasAdditionalInfo(existing.breakTitle);
                    const newHasInfo = hasAdditionalInfo(newTitle);
                    return (newHasInfo && !existingHasInfo) || 
                           (newHasInfo === existingHasInfo && newTitle.length > existing.breakTitle.length);
                };

                // Groups breaks by start time and title to avoid duplicates
                const extractBreaks = (widgetData, conferenceDays) => {
                    if (!widgetData || !widgetData.talks) return [];
                    const breakMap = new Map();
                    
                    widgetData.talks.forEach((talk) => {
                        if (talk.slot_type === 'break') {
                            // Get title from de-formal, de, or en
                            let title = '';
                            if (typeof talk.title === 'object') {
                                title = talk.title['de-formal'] || talk.title.de || talk.title.en || '';
                            } else if (typeof talk.title === 'string') {
                                title = talk.title;
                            }
                            
                            if (!title) return;

                            const startDate = new Date(talk.start);
                            const endDate = new Date(talk.end);
                            const durationMs = endDate - startDate;
                            const durationMins = Math.floor(durationMs / 60000);
                            const durationHH = String(Math.floor(durationMins / 60)).padStart(2, '0');
                            const durationMM = String(durationMins % 60).padStart(2, '0');
                            const duration = `${durationHH}:${durationMM}`;

                            let dayIndex = null;
                            let dayDate = null;
                            const breakDate = startDate.toISOString().split('T')[0];
                            if (conferenceDays) {
                                const day = conferenceDays.find(d => d.date === breakDate);
                                if (day) {
                                    dayIndex = day.index;
                                    dayDate = day.date;
                                }
                            }
                            
                            // Create a unique key for this break (only start time, not title)
                            // This groups all breaks at the same time together, even if titles differ slightly
                            const startTime = isoToHHMM(talk.start);
                            const breakKey = `${dayIndex}-${startTime}`;
                            
                            // Generate unique ID that includes day and time to ensure different breaks get different train numbers
                            // Use talk.id if available, but make it unique by adding day and time
                            const uniqueId = talk.id 
                                ? `${talk.id}-${dayIndex}-${startTime.replace(':', '')}` 
                                : `break-${dayIndex}-${startTime.replace(':', '')}-${talk.start}`;
                            
                            // Only add if we haven't seen this break before, or if this title has more info
                            if (!breakMap.has(breakKey)) {
                                breakMap.set(breakKey, {
                                    id: uniqueId,
                                    title: `${breakTitlePrefix} ${title}`,
                                    start: startTime,
                                    duration: duration,
                                    roomName: breakRoomName, // Generic room name for breaks
                                    dayIndex: dayIndex,
                                    dayDate: dayDate,
                                    isBreak: true,
                                    breakTitle: title
                                });
                            } else {
                                const existing = breakMap.get(breakKey);
                                if (shouldReplaceBreak(existing, title)) {
                                    breakMap.set(breakKey, {
                                        id: uniqueId,
                                        title: `${breakTitlePrefix} ${title}`,
                                        start: startTime,
                                        duration: duration,
                                        roomName: breakRoomName,
                                        dayIndex: dayIndex,
                                        dayDate: dayDate,
                                        isBreak: true,
                                        breakTitle: title
                                    });
                                }
                            }
                        }
                    });
                    return Array.from(breakMap.values());
                };

                // Room abbreviations/icons
                const abbreviateRoom = (roomName) => {
                    // FOSSGIS 2026 Räume
                    if (roomName.startsWith('HS1')) return 'HS1';
                    if (roomName.startsWith('HS2')) return 'HS2';
                    if (roomName.startsWith('HS3')) return 'HS3';
                    if (roomName.startsWith('HS4')) return 'HS4';
                    if (roomName.startsWith('BoF1')) return 'BoF1';
                    if (roomName.startsWith('BoF2')) return 'BoF2';
                    if (roomName.startsWith('Bof3') || roomName.includes('Expert:innen')) return 'BoF3';
                    if (roomName.startsWith('WS1')) return 'WS1';
                    if (roomName.startsWith('WS2')) return 'WS2';
                    if (roomName.startsWith('WS3')) return 'WS3';
                    if (roomName.startsWith('WS4')) return 'WS4';
                    if (roomName.startsWith('OSM1')) return 'OSM1';
                    if (roomName.startsWith('OSM2')) return 'OSM2';
                    if (roomName.startsWith('OSM3')) return 'OSM3';
                    if (roomName.includes('Opening OSM')) return 'OO';
                    if (roomName.toLowerCase().includes('posterausstellung')) return 'Post';
                    if (roomName.includes('Foyer MH') || roomName.toLowerCase().includes('community sprint')) return 'Foyer';
                    if (roomName === 'Mensa') return 'Mensa';

                    const versionTokenMatch = formattedVersion.match(/Version\s+([^;\s]+)/i);
                    const fallbackToken = formattedVersion.split(/[^\w.]+/).filter(Boolean)[0] || '';
                    const versionToken = versionTokenMatch ? versionTokenMatch[1] : fallbackToken;

                    if (versionToken && dateMatch) {
                        const [, year, month, day, time] = dateMatch;
                        const timeNoTZ = time.replace(/(Z|[+-]\d{2}:?\d{2})$/, '');
                        return `v${versionToken} vom ${day}.${month}.${year} ${timeNoTZ}`;
                    }
                    if (versionToken) return `v${versionToken}`;
                    if (dateMatch) {
                        const [, year, month, day, time] = dateMatch;
                        const timeNoTZ = time.replace(/(Z|[+-]\d{2}:?\d{2})$/, '');

                    const allTalks = [];
                    days.forEach((day) => {
                        Object.entries(day.rooms || {}).forEach(([roomName, talks]) => {
                            talks.forEach((talk) => {
                                if (idFilter && !idFilter.has(talk.id)) return;
                                if (idFilter) {
                                    if (applyPassesWithIdFilter && !passesFilters(talk, roomName)) return;
                                } else if (!passesFilters(talk, roomName)) return;
                                allTalks.push({ ...talk, dayIndex: day.index, dayDate: day.date, roomName });
                            });
                        });
                    });
                    if (widgetData && includeBreaks) {
                        const breaks = extractBreaks(widgetData, conferenceDays);
                        breaks.forEach((breakEvent) => {
                            if (selectedDay !== null && breakEvent.dayIndex !== selectedDay) return;
                            if (!passesFilters(breakEvent, breakEvent.roomName)) return;
                            allTalks.push(breakEvent);
                        });

                    const titleLinkForOthers =
                        'Kopiert den Link in die Zwischenablage. Einfügen in Chat, E-Mail oder Messenger. Auf vielen Handys erscheint zusätzlich ein Teilen-Dialog.';
                    const labelSaveAllShort = 'Import';
                    const titleSaveAll = FAVORITES_COPY.importSaveAllDetail;
                    const titleImportDisabled = 'Nur bei geöffnetem gültigen Teilen-Link mit Auswahl.';

                    const shareLinkBtn = buildToolbarShareLinkButton({
                        disabled: shareDisabled,
                        labelText: labelLinkShort,
                        titleText: titleLinkForOthers,
                        ariaWhenDisabled: 'Keine Auswahl zum Kopieren',
                        icon: 'link-2',
                    });
                    const importDisabled = !shareSelectionOk;
                    const importAllBtn = buildToolbarPlainButton({
                        id: 'toolbar-import-all',
                        className: '',
                        label: labelSaveAllShort,
                        title: importDisabled ? titleImportDisabled : titleSaveAll,
                        disabled: importDisabled,
                        icon: 'bookmark-plus',
                        ariaLabel: importDisabled ? titleImportDisabled : titleSaveAll,
                    });

                    const labelShowFullShort = 'Gesamt';
                    const titleShowFullSchedule =
                        'Blendet die Auswahl aus diesem Teilen-Link aus und zeigt den vollständigen Fahrplan. Gespeicherte Favoriten bleiben erhalten.';
                    const titleShowFullDisabled = 'Nur bei geöffnetem Teilen-Link mit Auswahl.';
                    const showFullDisabled = !shareSelectionOk;
                    const showFullScheduleBtn = buildToolbarPlainButton({
                        id: 'toolbar-show-full-schedule',
                        className: 'toolbar-show-full-schedule',
                        label: labelShowFullShort,
                        title: showFullDisabled ? titleShowFullDisabled : titleShowFullSchedule,
                        disabled: showFullDisabled,
                        icon: 'calendar-days',
                        ariaLabel: showFullDisabled ? titleShowFullDisabled : titleShowFullSchedule,
                    });

                    const labelClearShort = 'Leeren';
                    const titleClearFavorites = FAVORITES_COPY.clearAllDetail;
                    const titleClearDisabled = 'Keine gespeicherten Favoriten.';
                    const clearDisabled = !hasFavorites;
                    const clearAllBtn = buildToolbarPlainButton({
                        id: 'toolbar-clear-favorites',
                        className: 'toolbar-clear-favorites',
                        label: labelClearShort,
                        title: clearDisabled ? titleClearDisabled : titleClearFavorites,
                        disabled: clearDisabled,
                        icon: 'trash-2',
                        ariaLabel: clearDisabled ? titleClearDisabled : titleClearFavorites,
                    });

                    const toolbarMainActions = `${showFullScheduleBtn}${clearAllBtn}${importAllBtn}${shareLinkBtn}`;

                    toolbarRoot.innerHTML = `<div class="schedule-toolbar">
                            ${favoriteFilterMarkup}
                            ${toolbarMainActions}
                        </div>`;
                    if (urlTooLong && !shareDisabled) {
                        toolbarRoot.insertAdjacentHTML(
                            'beforeend',
                            `<p class="share-url-warn" role="status">Der Link ist sehr lang. In manchen Apps kann das stören.</p>`
                        );
                    }

                    const showFullScheduleEl = document.getElementById('toolbar-show-full-schedule');
                    if (showFullScheduleEl) {
                        showFullScheduleEl.addEventListener('click', () => {
                            const u = new URL(location.href);
                            u.hash = '';
                            replaceBrowserUrlFrom(u);
                            applyState();
                            queueFocusToolbarRoot();
                        });
                    }
                    const shareLinkEl = document.getElementById('toolbar-share-link');
                    if (shareLinkEl && !shareDisabled) {
                        let shareStatusTimer;
                        let copyLabelResetTimer;
                        const labelAfterCopyOk = 'Kopiert';
                        const copyOkLabelMs = 2800;
                        const announceCopyShareStatus = (msg) => {
                            if (!statusRoot) return;
                            statusRoot.textContent = msg;
                            statusRoot.classList.add('schedule-status-sr');
                            window.clearTimeout(shareStatusTimer);
                            shareStatusTimer = window.setTimeout(() => {
                                statusRoot.textContent = '';
                            }, 2000);
                        };
                        const restoreShareLinkButtonLabel = () => {
                            shareLinkEl.innerHTML = toolbarBtnInner('link-2', labelLinkShort);
                            shareLinkEl.setAttribute('title', titleLinkForOthers);
                            shareLinkEl.setAttribute('aria-label', titleLinkForOthers);
                            if (window.lucide) window.lucide.createIcons();
                        };
                        shareLinkEl.addEventListener('click', async () => {
                            const u = new URL(location.href);
                            u.hash = buildShareHashFromIds(shareIdsForLink);
                            if (typeof navigator.share === 'function') {
                                try {
                                    await navigator.share({ url: u.href });
                                    announceCopyShareStatus('Link geteilt.');
                                    return;
                                } catch (e) {
                                    if (e && e.name === 'AbortError') return;
                                }
                            }
                            try {
                                await navigator.clipboard.writeText(u.href);
                                window.clearTimeout(copyLabelResetTimer);
                                shareLinkEl.innerHTML = toolbarBtnInner('check', labelAfterCopyOk);
                                shareLinkEl.setAttribute(
                                    'title',
                                    'Link liegt in der Zwischenablage. Nochmals klicken zum erneuten Kopieren.'
                                );
                                shareLinkEl.setAttribute('aria-label', 'Kopiert. Link in der Zwischenablage.');
                                if (window.lucide) window.lucide.createIcons();
                                copyLabelResetTimer = window.setTimeout(() => {
                                    restoreShareLinkButtonLabel();
                                }, copyOkLabelMs);
                            } catch {
                                if (!statusRoot) return;
                                statusRoot.textContent =
                                    'Kopieren nicht möglich. Adresse in der Titelleiste markieren und kopieren.';
                                statusRoot.classList.remove('schedule-status-sr');
                                window.clearTimeout(shareStatusTimer);
                                shareStatusTimer = window.setTimeout(() => {
                                    statusRoot.textContent = '';
                                    statusRoot.classList.add('schedule-status-sr');
                                }, 6000);
                            }
                        });
                    }
                    const clearFavoritesEl = document.getElementById('toolbar-clear-favorites');
                    if (clearFavoritesEl && clearFavoritesDialogEl) {
                        clearFavoritesEl.addEventListener('click', () => {
                            clearFavoritesDialogEl.showModal();
                        });
                    }
                    const favoriteFilterToggle = document.getElementById('toolbar-favorites-toggle');
                    if (favoriteFilterToggle && !favoriteFilterDisabled) {
                        favoriteFilterToggle.addEventListener('click', () => {
                            const u = new URL(location.href);
                            if (u.searchParams.get('favorites') === '1') u.searchParams.delete('favorites');
                            else u.searchParams.set('favorites', '1');
                            replaceBrowserUrlFrom(u);
                            applyState();
                            queueFocusToolbarRoot();
                        });
                    }
                    const importAll = document.getElementById('toolbar-import-all');
                    if (importAll) {
                        let importStatusTimer;
                        importAll.addEventListener('click', () => {
                            if (!shareIdSet || shareIdSet.size === 0) return;
                            const cur = loadFavorites();
                            const merged = new Set([...cur.ids, ...shareIdSet]);
                            const ok = saveFavorites({ v: 1, ids: [...merged] });
                            if (ok && statusRoot) {
                                statusRoot.textContent = 'Favoriten übernommen.';
                                statusRoot.classList.add('schedule-status-sr');
                                window.clearTimeout(importStatusTimer);
                                importStatusTimer = window.setTimeout(() => {
                                    statusRoot.textContent = '';
                                }, 2500);
                            }
                            applyState();
                            queueFocusToolbarRoot();
                        });
                    }
                };

                const applyUrlState = (opts = {}) => {
                    const forPrint = opts.forPrint === true;
                    const favFocusTalkId = pendingFocusFavTalkId;
                    pendingFocusFavTalkId = null;
                    try {
                    refreshUrlState();
                    // With a valid share hash (#f=1/...), only the shared list is shown; ?favorites= is ignored.
                    // Remove ?favorites= from the address bar so it does not look like an active filter.
                    let parsedShare = parseShareHash(location.hash);
                    if (
                        !forPrint &&
                        parsedShare.kind === 'ok' &&
                        new URLSearchParams(location.search).has('favorites')
                    ) {
                        const u = new URL(location.href);
                        u.searchParams.delete('favorites');
                        replaceBrowserUrlFrom(u);
                        refreshUrlState();
                    }
                    const stored = loadFavorites();
                    currentFavSet = new Set(stored.ids);
                    if (stored.ids.length === 0 && urlState.favoritesParam === '1') {
                        const u = new URL(location.href);
                        u.searchParams.delete('favorites');
                        replaceBrowserUrlFrom(u);
                        refreshUrlState();
                    }

                    const derived = deriveViewMode({
                        parsedShare,
                        favoritesParam: urlState.favoritesParam,
                    });
                    let { viewMode, shareIdSet, shareErrorReason } = derived;
                    programFiltersActive = derived.programFiltersActive;

                    const isSingleDay =
                        urlState.isSingleDay &&
                        (viewMode === VIEW_NORMAL || viewMode === VIEW_OWN_FAVORITES) &&
                        (!forPrint || viewMode === VIEW_OWN_FAVORITES);
                    const selectedDay = urlState.selectedDay;
                    const collectOpts = {
                        applyPassesWithIdFilter: viewMode === VIEW_OWN_FAVORITES,
                    };

                    if (bannersRoot) {
                        if (viewMode === VIEW_SHARE_ERROR) {
                            bannersRoot.innerHTML = `<div class="share-error-banner" role="alert">${escapeHtml(shareErrorBannerText(shareErrorReason))}</div>`;
                        } else {
                            bannersRoot.innerHTML = '';
                        }
                    }

                    if (toolbarRoot && forPrint) {
                        toolbarRoot.innerHTML = '';
                    }
                    if (toolbarRoot && !forPrint) {
                        renderScheduleToolbar({ stored, viewMode, shareIdSet, applyUrlState });
                    }

                    if (viewMode === VIEW_NORMAL || viewMode === VIEW_OWN_FAVORITES) {
                        updateStationTitle(buildFilterLabelParts());
                    } else {
                        updateStationTitle([]);
                    }

                    if (viewMode === VIEW_SHARE_ERROR) {
                        departureTableContent.innerHTML = '';
                        if (window.lucide) window.lucide.createIcons();
                        return;
                    }

                    const idFilterForView =
                        viewMode === VIEW_SHARE && shareIdSet
                            ? shareIdSet
                            : viewMode === VIEW_OWN_FAVORITES
                            ? currentFavSet
                            : null;
                    const includeBreaks = idFilterForView === null && (forPrint || viewMode === VIEW_NORMAL);

                    if (viewMode === VIEW_OWN_FAVORITES && currentFavSet.size === 0) {
                        departureTableContent.innerHTML =
                            '<div class="favorites-empty" role="status">' + escapeHtml(FAVORITES_COPY.emptyState) + '</div>';
                        if (window.lucide) window.lucide.createIcons();
                        return;
                    }

                    const runMultiDay = () => {
                        if (headerLeft && headerDateRange) headerLeft.textContent = headerDateRange;
                        const allTalks = collectAndSortTalks(data.schedule.conference.days, data.schedule.conference.days, widgetData, null, {
                            idFilter: idFilterForView,
                            includeBreaks,
                            ...collectOpts,
                        });
                        if (!allTalks.length && (viewMode === VIEW_SHARE || viewMode === VIEW_OWN_FAVORITES)) {
                            departureTableContent.innerHTML = '<div class="no-data" role="status">Keine passenden Einträge im aktuellen Programm.</div>';
                            return;
                        }
                        const talksByDay = new Map();
                        allTalks.forEach((row) => {
                            if (!talksByDay.has(row.dayIndex)) talksByDay.set(row.dayIndex, []);
                            talksByDay.get(row.dayIndex).push(row);
                        });

                        departureTableContent.innerHTML = '';
                        [...talksByDay.keys()].sort((a, b) => a - b).forEach((dayIndex) => {
                            const dayRows = talksByDay.get(dayIndex);
                            const weekday = weekdayFromIso(dayRows[0].dayDate);
                            const dayLabel = weekday ? `Tag ${dayIndex} (${weekday})` : `Tag ${dayIndex}`;
                            const dayHeaderHTML = `
                        <div class="time-range">
                                <div></div>
                                <div></div>
                                <div><a href="${buildFilterToggleUrl('only-day', dayIndex)}">${dayLabel}</a></div>
                                <div></div>
                        </div>`;
                            const firstRowHTML = renderRow(dayRows[0]);
                            departureTableContent.insertAdjacentHTML('beforeend', `<div class="day-group">${dayHeaderHTML}${firstRowHTML}</div>`);
                            for (let i = 1; i < dayRows.length; i += 1) {
                                departureTableContent.insertAdjacentHTML('beforeend', renderRow(dayRows[i]));
                            }
                        });

                        const { trackRowsHtml, roomRowsHtml } = buildLegendFilterHtml(data);
                        const legend = renderLegend(
                            formattedVersion,
                            `Dieser Fahrplan ist bis Tag ${totalDays} (16:00) Eigentum der FOSSGIS-Konferenz. Danach geht er in die chaotische Selbstverwaltung über und darf legal entwendet werden.`,
                            trackRowsHtml,
                            roomRowsHtml
                        );
                        departureTableContent.insertAdjacentHTML('beforeend', legend);
                    };

                    const runSingleDay = () => {
                        const dayObj = data?.schedule?.conference?.days?.find((d) => d.index === selectedDay);
                        if (!dayObj) {
                            showError(`Keine Inhalte für Tag ${selectedDay} gefunden. Versuchen Sie z.B. ?only-day=0 oder ?only-day=2 in der URL.`);
                            return false;
                        }

                        const dayTalks = collectAndSortTalks([dayObj], data.schedule.conference.days, widgetData, selectedDay, {
                            idFilter: idFilterForView,
                            includeBreaks,
                            ...collectOpts,
                        });
                        if (!dayTalks.length) {
                            if (viewMode === VIEW_OWN_FAVORITES) {
                                departureTableContent.innerHTML =
                                    '<div class="no-data" role="status">Keine passenden Einträge im aktuellen Programm.</div>';
                                return true;
                            }
                            showError(`Keine Inhalte für Tag ${selectedDay} gefunden. Versuchen Sie z.B. ?only-day=0 oder ?only-day=2 in der URL.`);
                            return false;
                        }

                        if (headerLeft) {
                            const [year, month, day] = (dayObj.date || '').split('-');
                            const weekday = weekdayFromIso(dayObj.date);
                            headerLeft.textContent = weekday
                                ? `${day}.${month}.${year} — ${weekday} — Tag ${selectedDay}`
                                : `${day}.${month}.${year} — Tag ${selectedDay}`;
                        }

                        const slots = [];
                        let currentLabel = null;
                        let currentRows = null;
                        dayTalks.forEach((row) => {
                            const rangeLabel = getTimeRangeLabel(row.start);
                            if (rangeLabel !== currentLabel) {
                                currentLabel = rangeLabel;
                                currentRows = [];
                                slots.push({ label: rangeLabel, rows: currentRows });
                            }
                            currentRows.push(row);
                        });

                        departureTableContent.innerHTML = '';
                        slots.forEach(({ label, rows }) => {
                            const headerHTML = label
                                ? `
                        <div class="time-range">
                            <div></div>
                            <div></div>
                            <div>${label}</div>
                            <div></div>
                        </div>`
                                : '';
                            const firstRowHTML = renderRow(rows[0]);
                            departureTableContent.insertAdjacentHTML('beforeend', `<div class="time-range-group">${headerHTML}${firstRowHTML}</div>`);
                            for (let i = 1; i < rows.length; i += 1) {
                                departureTableContent.insertAdjacentHTML('beforeend', renderRow(rows[i]));
                            }
                        });

                        const takeWithText =
                            selectedDay === totalDays
                                ? 'Nimm mich beim Abbau mit.'
                                : `Nimm mich ab Tag ${selectedDay + 1} mit, aber lass das Klebeband da.`;

                        const { trackRowsHtml, roomRowsHtml } = buildLegendFilterHtml(data);
                        const legend = renderLegend(formattedVersion, takeWithText, trackRowsHtml, roomRowsHtml);
                        departureTableContent.insertAdjacentHTML('beforeend', legend);
                        return true;
                    };

                    if (forPrint || viewMode === VIEW_NORMAL || viewMode === VIEW_OWN_FAVORITES) {
                        if (!isSingleDay) runMultiDay();
                        else if (runSingleDay() === false) return;
                    } else {
                        runMultiDay();
                    }

                    if (window.lucide) window.lucide.createIcons();

                    if (disableLinkUnderline) {
                        const anchors = document.querySelectorAll('a[href]');
                        anchors.forEach((a) => {
                            if (a.querySelector('img')) return;
                            a.removeAttribute('href');
                        });
                    }
                    } finally {
                        if (favFocusTalkId !== null) {
                            requestAnimationFrame(() => {
                                requestAnimationFrame(() => {
                                    const el = departureTableContent.querySelector(`.fav-toggle[data-talk-id="${favFocusTalkId}"]`);
                                    if (el) el.focus();
                                });
                            });
                        }
                    }
                };

                departureTableContent.addEventListener('click', (e) => {
                    const btn = e.target.closest('.fav-toggle');
                    if (!btn || !departureTable.contains(btn)) return;
                    const id = Number(btn.dataset.talkId);
                    if (!Number.isFinite(id)) return;
                    pendingFocusFavTalkId = id;
                    toggleFavorite(id);
                    applyUrlState();
                });

                window.addEventListener('storage', (e) => {
                    if (e.key !== STORAGE_KEY) return;
                    applyUrlState();
                });

                window.addEventListener('hashchange', () => applyUrlState());
                window.addEventListener('popstate', () => applyUrlState());

                window.addEventListener('beforeprint', () => {
                    applyUrlState({ forPrint: true });
                });
                window.addEventListener('afterprint', () => {
                    applyUrlState({ forPrint: false });
                });

                const performClearAllFavorites = () => {
                    const ok = saveFavorites({ v: 1, ids: [] });
                    if (!ok) return;
                    refreshUrlState();
                    const u = new URL(location.href);
                    if (urlState.favoritesParam === '1') u.searchParams.delete('favorites');
                    if (parseShareHash(location.hash).kind === 'ok') u.hash = '';
                    replaceBrowserUrlFrom(u);
                    applyUrlState();
                    queueFocusElementById('toolbar-clear-favorites');
                };

                if (clearFavoritesDialogEl) {
                    const clearDialogCancel = document.getElementById('clear-favorites-dialog-cancel');
                    const clearDialogConfirm = document.getElementById('clear-favorites-dialog-confirm');
                    if (clearDialogCancel) {
                        clearDialogCancel.addEventListener('click', () => {
                            clearFavoritesDialogEl.close();
                            queueFocusElementById('toolbar-clear-favorites');
                        });
                    }
                    if (clearDialogConfirm) {
                        clearDialogConfirm.addEventListener('click', () => {
                            clearFavoritesDialogEl.close();
                            performClearAllFavorites();
                        });
                    }
                    clearFavoritesDialogEl.addEventListener('cancel', () => {
                        queueFocusElementById('toolbar-clear-favorites');
                    });
                }

                applyUrlState();
            })();
        </script>
</body>
</html>
